<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        .game-container {
            text-align: center;
        }
        h1 {
            color: #e94560;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .info {
            color: #fff;
            margin-bottom: 10px;
            font-size: 14px;
        }
        canvas {
            border: 3px solid #e94560;
            background: #0f0f23;
            display: block;
            margin: 0 auto;
        }
        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 13px;
        }
        .controls span {
            margin: 0 10px;
            padding: 5px 10px;
            background: #16213e;
            border-radius: 5px;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #e94560;
            padding: 30px 50px;
            border-radius: 10px;
            border: 2px solid #e94560;
            display: none;
        }
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 15px;
        }
        .game-over p {
            color: #fff;
            margin-bottom: 20px;
        }
        .game-over button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .game-over button:hover {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 坦克大战</h1>
        <div class="info">
            生命: <span id="lives">3</span> |
            分数: <span id="score">0</span> |
            关卡: <span id="level">1</span> |
            敌人: <span id="enemies">0</span>
        </div>
        <canvas id="gameCanvas" width="640" height="640"></canvas>
        <div class="controls">
            <span>↑↓←→ 移动</span>
            <span>空格 射击</span>
            <span>P 暂停</span>
        </div>
    </div>
    <div class="game-over" id="gameOver">
        <h2 id="gameOverTitle">游戏结束</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏常量
        const TILE_SIZE = 32;
        const GRID_SIZE = 20;

        // 地图元素
        const EMPTY = 0;
        const BRICK = 1;
        const STEEL = 2;
        const WATER = 3;
        const GRASS = 4;
        const BASE = 5;

        // 游戏状态
        let gameState = {
            lives: 3,
            score: 0,
            level: 1,
            paused: false,
            gameOver: false,
            victory: false
        };

        // 地图
        let map = [];

        // 玩家坦克
        let player = {
            x: 9 * TILE_SIZE,
            y: 18 * TILE_SIZE,
            direction: 'up',
            speed: 3,
            cooldown: 0,
            invincible: 0,
            color: '#00ff00'
        };

        // 敌人坦克
        let enemies = [];

        // 子弹
        let bullets = [];

        // 爆炸效果
        let explosions = [];

        // 按键状态
        let keys = {};

        // 基础地图模板
        function generateMap() {
            map = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                map[y] = [];
                for (let x = 0; x < GRID_SIZE; x++) {
                    map[y][x] = EMPTY;
                }
            }

            // 添加边界墙
            for (let i = 0; i < GRID_SIZE; i++) {
                if (Math.random() > 0.3) map[0][i] = BRICK;
                if (Math.random() > 0.3) map[GRID_SIZE-1][i] = BRICK;
            }

            // 随机生成障碍物
            for (let i = 0; i < 30 + gameState.level * 5; i++) {
                let x = Math.floor(Math.random() * (GRID_SIZE - 4)) + 2;
                let y = Math.floor(Math.random() * (GRID_SIZE - 6)) + 2;
                let type = Math.random() > 0.7 ? STEEL : BRICK;
                map[y][x] = type;
                if (Math.random() > 0.5 && x + 1 < GRID_SIZE - 2) {
                    map[y][x + 1] = type;
                }
            }

            // 添加水域
            for (let i = 0; i < 5; i++) {
                let x = Math.floor(Math.random() * (GRID_SIZE - 4)) + 2;
                let y = Math.floor(Math.random() * (GRID_SIZE - 6)) + 2;
                map[y][x] = WATER;
            }

            // 添加草地
            for (let i = 0; i < 8; i++) {
                let x = Math.floor(Math.random() * (GRID_SIZE - 2));
                let y = Math.floor(Math.random() * 6 + 12);
                map[y][x] = GRASS;
            }

            // 基地周围的保护墙
            map[18][9] = EMPTY;
            map[18][10] = EMPTY;
            map[17][9] = BRICK;
            map[17][10] = BRICK;
            map[17][8] = BRICK;
            map[17][11] = BRICK;
            map[18][8] = BRICK;
            map[18][11] = BRICK;
            map[19][9] = BASE;
            map[19][10] = BASE;

            // 清空玩家出生点
            map[18][9] = EMPTY;
            map[18][10] = EMPTY;
        }

        // 生成敌人
        function spawnEnemies() {
            enemies = [];
            let count = 3 + gameState.level;
            let spawnPoints = [
                {x: 0, y: 0},
                {x: 9, y: 0},
                {x: 18, y: 0}
            ];

            for (let i = 0; i < count && i < 6; i++) {
                let spawn = spawnPoints[i % 3];
                enemies.push({
                    x: spawn.x * TILE_SIZE,
                    y: spawn.y * TILE_SIZE,
                    direction: 'down',
                    speed: 1 + gameState.level * 0.2,
                    cooldown: 0,
                    health: 1 + Math.floor(gameState.level / 3),
                    moveTimer: 0,
                    color: '#ff4444'
                });
            }
            updateEnemyCount();
        }

        function updateEnemyCount() {
            document.getElementById('enemies').textContent = enemies.length;
        }

        // 绘制地图
        function drawMap() {
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let tile = map[y][x];
                    let px = x * TILE_SIZE;
                    let py = y * TILE_SIZE;

                    switch(tile) {
                        case BRICK:
                            ctx.fillStyle = '#b5651d';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            ctx.strokeStyle = '#8b4513';
                            ctx.strokeRect(px, py, TILE_SIZE/2, TILE_SIZE/2);
                            ctx.strokeRect(px + TILE_SIZE/2, py, TILE_SIZE/2, TILE_SIZE/2);
                            ctx.strokeRect(px, py + TILE_SIZE/2, TILE_SIZE/2, TILE_SIZE/2);
                            ctx.strokeRect(px + TILE_SIZE/2, py + TILE_SIZE/2, TILE_SIZE/2, TILE_SIZE/2);
                            break;
                        case STEEL:
                            ctx.fillStyle = '#a0a0a0';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#c0c0c0';
                            ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            break;
                        case WATER:
                            ctx.fillStyle = '#1e90ff';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#00bfff';
                            ctx.fillRect(px + 4, py + 4, TILE_SIZE - 8, 4);
                            break;
                        case GRASS:
                            ctx.fillStyle = '#228b22';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            break;
                        case BASE:
                            ctx.fillStyle = '#ffd700';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#ff6600';
                            ctx.font = '20px Arial';
                            ctx.fillText('🏠', px + 6, py + 24);
                            break;
                    }
                }
            }
        }

        // 绘制坦克
        function drawTank(tank, isPlayer) {
            ctx.save();
            ctx.translate(tank.x + TILE_SIZE/2, tank.y + TILE_SIZE/2);

            switch(tank.direction) {
                case 'up': break;
                case 'down': ctx.rotate(Math.PI); break;
                case 'left': ctx.rotate(-Math.PI/2); break;
                case 'right': ctx.rotate(Math.PI/2); break;
            }

            // 坦克身体
            ctx.fillStyle = tank.color;
            ctx.fillRect(-12, -12, 24, 24);

            // 履带
            ctx.fillStyle = '#333';
            ctx.fillRect(-14, -14, 6, 28);
            ctx.fillRect(8, -14, 6, 28);

            // 炮管
            ctx.fillStyle = isPlayer ? '#00cc00' : '#cc0000';
            ctx.fillRect(-3, -20, 6, 16);

            // 炮塔
            ctx.fillStyle = isPlayer ? '#00ff00' : '#ff4444';
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // 无敌状态闪烁
            if (tank.invincible > 0 && Math.floor(tank.invincible / 5) % 2 === 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(tank.x, tank.y, TILE_SIZE, TILE_SIZE);
            }
        }

        // 绘制子弹
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.isPlayer ? '#ffff00' : '#ff6600';
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制爆炸
        function drawExplosions() {
            explosions = explosions.filter(exp => {
                exp.frame++;
                let radius = exp.frame * 2;

                ctx.beginPath();
                ctx.arc(exp.x, exp.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, ${100 - exp.frame * 5}, 0, ${1 - exp.frame/15})`;
                ctx.fill();

                return exp.frame < 15;
            });
        }

        // 创建爆炸
        function createExplosion(x, y) {
            explosions.push({x: x + TILE_SIZE/2, y: y + TILE_SIZE/2, frame: 0});
        }

        // 射击
        function shoot(tank, isPlayer) {
            if (tank.cooldown > 0) return;

            let bullet = {
                x: tank.x + TILE_SIZE/2,
                y: tank.y + TILE_SIZE/2,
                direction: tank.direction,
                speed: 8,
                isPlayer: isPlayer
            };

            switch(tank.direction) {
                case 'up': bullet.y -= TILE_SIZE/2; break;
                case 'down': bullet.y += TILE_SIZE/2; break;
                case 'left': bullet.x -= TILE_SIZE/2; break;
                case 'right': bullet.x += TILE_SIZE/2; break;
            }

            bullets.push(bullet);
            tank.cooldown = 30;
        }

        // 碰撞检测
        function checkCollision(x, y, width, height) {
            let left = Math.floor(x / TILE_SIZE);
            let right = Math.floor((x + width - 1) / TILE_SIZE);
            let top = Math.floor(y / TILE_SIZE);
            let bottom = Math.floor((y + height - 1) / TILE_SIZE);

            for (let ty = top; ty <= bottom; ty++) {
                for (let tx = left; tx <= right; tx++) {
                    if (ty < 0 || ty >= GRID_SIZE || tx < 0 || tx >= GRID_SIZE) {
                        return true;
                    }
                    let tile = map[ty][tx];
                    if (tile === BRICK || tile === STEEL || tile === WATER) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 更新玩家
        function updatePlayer() {
            if (player.cooldown > 0) player.cooldown--;
            if (player.invincible > 0) player.invincible--;

            let newX = player.x;
            let newY = player.y;

            if (keys['ArrowUp'] || keys['KeyW']) {
                player.direction = 'up';
                newY -= player.speed;
            } else if (keys['ArrowDown'] || keys['KeyS']) {
                player.direction = 'down';
                newY += player.speed;
            } else if (keys['ArrowLeft'] || keys['KeyA']) {
                player.direction = 'left';
                newX -= player.speed;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.direction = 'right';
                newX += player.speed;
            }

            if (!checkCollision(newX, player.y, TILE_SIZE, TILE_SIZE)) {
                player.x = newX;
            }
            if (!checkCollision(player.x, newY, TILE_SIZE, TILE_SIZE)) {
                player.y = newY;
            }

            if (keys['Space']) {
                shoot(player, true);
            }
        }

        // 更新敌人AI
        function updateEnemies() {
            enemies.forEach(enemy => {
                if (enemy.cooldown > 0) enemy.cooldown--;
                enemy.moveTimer++;

                // 随机改变方向
                if (enemy.moveTimer > 60 || Math.random() < 0.01) {
                    enemy.moveTimer = 0;
                    let dirs = ['up', 'down', 'left', 'right'];

                    // 有概率朝向玩家
                    if (Math.random() < 0.4) {
                        if (player.y > enemy.y) dirs = ['down', 'down', 'left', 'right'];
                        else if (player.y < enemy.y) dirs = ['up', 'up', 'left', 'right'];
                        if (player.x > enemy.x) dirs.push('right', 'right');
                        else dirs.push('left', 'left');
                    }

                    enemy.direction = dirs[Math.floor(Math.random() * dirs.length)];
                }

                let newX = enemy.x;
                let newY = enemy.y;

                switch(enemy.direction) {
                    case 'up': newY -= enemy.speed; break;
                    case 'down': newY += enemy.speed; break;
                    case 'left': newX -= enemy.speed; break;
                    case 'right': newX += enemy.speed; break;
                }

                if (!checkCollision(newX, enemy.y, TILE_SIZE, TILE_SIZE) &&
                    !checkCollision(enemy.x, newY, TILE_SIZE, TILE_SIZE)) {
                    enemy.x = newX;
                    enemy.y = newY;
                } else {
                    enemy.moveTimer = 100; // 强制改变方向
                }

                // 随机射击
                if (Math.random() < 0.02) {
                    shoot(enemy, false);
                }
            });
        }

        // 更新子弹
        function updateBullets() {
            bullets = bullets.filter(bullet => {
                switch(bullet.direction) {
                    case 'up': bullet.y -= bullet.speed; break;
                    case 'down': bullet.y += bullet.speed; break;
                    case 'left': bullet.x -= bullet.speed; break;
                    case 'right': bullet.x += bullet.speed; break;
                }

                // 边界检测
                if (bullet.x < 0 || bullet.x > canvas.width ||
                    bullet.y < 0 || bullet.y > canvas.height) {
                    return false;
                }

                // 地图碰撞
                let tx = Math.floor(bullet.x / TILE_SIZE);
                let ty = Math.floor(bullet.y / TILE_SIZE);

                if (ty >= 0 && ty < GRID_SIZE && tx >= 0 && tx < GRID_SIZE) {
                    let tile = map[ty][tx];

                    if (tile === BRICK) {
                        map[ty][tx] = EMPTY;
                        createExplosion(tx * TILE_SIZE, ty * TILE_SIZE);
                        return false;
                    }
                    if (tile === STEEL) {
                        createExplosion(tx * TILE_SIZE, ty * TILE_SIZE);
                        return false;
                    }
                    if (tile === BASE) {
                        map[ty][tx] = EMPTY;
                        gameState.gameOver = true;
                        createExplosion(tx * TILE_SIZE, ty * TILE_SIZE);
                        return false;
                    }
                }

                // 玩家子弹打敌人
                if (bullet.isPlayer) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        let enemy = enemies[i];
                        if (bullet.x > enemy.x && bullet.x < enemy.x + TILE_SIZE &&
                            bullet.y > enemy.y && bullet.y < enemy.y + TILE_SIZE) {
                            enemy.health--;
                            if (enemy.health <= 0) {
                                createExplosion(enemy.x, enemy.y);
                                enemies.splice(i, 1);
                                gameState.score += 100;
                                document.getElementById('score').textContent = gameState.score;
                                updateEnemyCount();
                            }
                            return false;
                        }
                    }
                } else {
                    // 敌人子弹打玩家
                    if (player.invincible <= 0 &&
                        bullet.x > player.x && bullet.x < player.x + TILE_SIZE &&
                        bullet.y > player.y && bullet.y < player.y + TILE_SIZE) {
                        gameState.lives--;
                        document.getElementById('lives').textContent = gameState.lives;
                        createExplosion(player.x, player.y);

                        if (gameState.lives <= 0) {
                            gameState.gameOver = true;
                        } else {
                            // 重生
                            player.x = 9 * TILE_SIZE;
                            player.y = 18 * TILE_SIZE;
                            player.invincible = 120;
                        }
                        return false;
                    }
                }

                return true;
            });
        }

        // 检查胜利
        function checkVictory() {
            if (enemies.length === 0) {
                gameState.level++;
                document.getElementById('level').textContent = gameState.level;

                if (gameState.level > 10) {
                    gameState.victory = true;
                    gameState.gameOver = true;
                } else {
                    generateMap();
                    spawnEnemies();
                    player.x = 9 * TILE_SIZE;
                    player.y = 18 * TILE_SIZE;
                    player.invincible = 120;
                    bullets = [];
                }
            }
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameState.paused && !gameState.gameOver) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                drawMap();
                drawBullets();

                enemies.forEach(enemy => drawTank(enemy, false));
                drawTank(player, true);

                // 草地覆盖在坦克上面
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (map[y][x] === GRASS) {
                            ctx.fillStyle = '#228b22';
                            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        }
                    }
                }

                drawExplosions();

                updatePlayer();
                updateEnemies();
                updateBullets();
                checkVictory();
            }

            // 暂停显示
            if (gameState.paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('已暂停', canvas.width/2, canvas.height/2);
                ctx.font = '18px Arial';
                ctx.fillText('按 P 继续', canvas.width/2, canvas.height/2 + 30);
            }

            // 游戏结束
            if (gameState.gameOver) {
                document.getElementById('finalScore').textContent = gameState.score;
                document.getElementById('gameOverTitle').textContent =
                    gameState.victory ? '🎉 恭喜通关!' : '💥 游戏结束';
                document.getElementById('gameOver').style.display = 'block';
            }

            requestAnimationFrame(gameLoop);
        }

        // 重新开始
        function restartGame() {
            gameState = {
                lives: 3,
                score: 0,
                level: 1,
                paused: false,
                gameOver: false,
                victory: false
            };

            document.getElementById('lives').textContent = gameState.lives;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('gameOver').style.display = 'none';

            player.x = 9 * TILE_SIZE;
            player.y = 18 * TILE_SIZE;
            player.direction = 'up';
            player.invincible = 120;

            bullets = [];
            explosions = [];

            generateMap();
            spawnEnemies();
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            if (e.code === 'KeyP') {
                gameState.paused = !gameState.paused;
            }

            if (e.code === 'Space') {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 初始化游戏
        generateMap();
        spawnEnemies();
        player.invincible = 120;
        gameLoop();
    </script>
</body>
</html>
